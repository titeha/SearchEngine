name: Publish SearchEngine package

on:
  workflow_dispatch:
  push:
    tags:
      - 'searchengine-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Восстановить зависимости
        run: dotnet restore ./SearchEngine.sln

      - name: Запустить тесты
        run: dotnet test ./SearchEngine.sln -c Release --no-restore

      - name: Собрать пакет
        run: dotnet pack ./src/SearchEngine/SearchEngine.csproj -c Release --no-restore -o ./artifacts

      - name: Войти в NuGet по OIDC
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Опубликовать пакет в NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate